services:
  opsmind-mongo:
    image: mongo:7
    container_name: opsmind-mongo
    ports:
      - "27018:27017"
    volumes:
      - opsmind-mongo-data:/data/db

  opsmind-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opsmind-backend
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://opsmind-mongo:27017/opsmind
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: gemini-2.5-flash
      AI_RESPONSE_LANGUAGE: pt-BR
    depends_on:
      - opsmind-mongo

volumes:
  opsmind-mongo-data: