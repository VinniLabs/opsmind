services:
  opsmind-mongo:
    image: mongo:7
    container_name: opsmind-mongo
    ports:
      - "27018:27017"
    volumes:
      - opsmind-mongo-data:/data/db

  opsmind-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opsmind-backend
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://opsmind-mongo:27017/opsmind

      AI_RESPONSE_LANGUAGE: pt-BR
      AI_PROVIDERS_ORDER: OLLAMA,GROQ,GEMINI

      OLLAMA_ENABLED: "true"
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3-coder:30b}

      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: llama-3.3-70b-versatile

      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: gemini-2.5-flash

    depends_on:
      opsmind-mongo:
        condition: service_started

volumes:
  opsmind-mongo-data: